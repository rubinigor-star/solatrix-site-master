<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>בדיקת גג חכמה | Solatrix Energy</title>
    <meta name="description" content="Roof Check by Solatrix — בדיקת גג חכמה לפני התקנת מערכת סולארית." />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      .heroScreen .heroGrid {
        align-items: stretch !important;
      }
      .visualCard.roofCheckHeroImage {
        position: relative !important;
        width: 100% !important;
        height: auto !important;
        min-height: 100% !important;
        aspect-ratio: auto !important;
        align-self: stretch !important;
        padding: 0 !important;
        overflow: hidden !important;
        background: #061827 !important;
        display: block !important;
        border-radius: 34px !important;
        box-shadow: var(--shadow) !important;
        isolation: isolate;
      }
      .visualCard.roofCheckHeroImage::before {
        content: "" !important;
        display: block !important;
        position: absolute !important;
        inset: -28px !important;
        z-index: 0 !important;
        background: url('https://raw.githubusercontent.com/rubinigor-star/solatrix-site-master/main/roof-check/hero%20master.jpg?v=69b8ec0c') center / cover no-repeat !important;
        filter: blur(22px) brightness(.52) saturate(1.08) !important;
        transform: scale(1.08) !important;
        opacity: .96 !important;
      }
      .visualCard.roofCheckHeroImage::after {
        content: "" !important;
        position: absolute !important;
        inset: 0 !important;
        z-index: 1 !important;
        background: linear-gradient(180deg,rgba(4,16,29,.06),rgba(4,16,29,.16)) !important;
        pointer-events: none !important;
      }
      .visualCard.roofCheckHeroImage > *:not(.roofCheckHeroArtwork) {
        display: none !important;
      }
      .roofCheckHeroArtwork {
        position: absolute !important;
        inset: 0 !important;
        z-index: 2 !important;
        display: block !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: contain !important;
        object-position: center !important;
        border-radius: inherit;
      }
      .heroScreen .heroCard {
        padding-inline: clamp(24px,4vw,42px) !important;
      }
      .heroScreen .featureChips {
        display: grid !important;
        grid-template-columns: repeat(3,minmax(0,1fr)) !important;
        gap: 10px !important;
        width: 100% !important;
        max-width: 560px !important;
        margin: -8px auto 26px !important;
      }
      .heroScreen .featureChips span {
        min-height: 72px !important;
        padding: 12px 10px !important;
        border-radius: 18px !important;
        background: linear-gradient(180deg,#fffaf0,#fff4dd) !important;
        border: 1px solid rgba(245,161,26,.24) !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 7px !important;
        color: #5f431d !important;
        font-size: 14px !important;
        line-height: 1.2 !important;
        text-align: center !important;
        box-shadow: 0 10px 24px rgba(28,20,12,.05) !important;
      }
      .heroScreen .featureChips svg {
        width: 22px;
        height: 22px;
        stroke: #f5a11a;
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex: 0 0 auto;
      }
      .heroScreen .primaryBtn.large {
        max-width: 460px !important;
        min-height: 68px !important;
        font-size: 22px !important;
        box-shadow: 0 18px 38px rgba(245,161,26,.32) !important;
      }
      .heroScreen .primaryBtn.large:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 22px 44px rgba(245,161,26,.38) !important;
      }
      @media (max-width: 760px) {
        .heroScreen .heroGrid {
          align-items: initial !important;
        }
        .visualCard.roofCheckHeroImage {
          width: 100% !important;
          height: auto !important;
          min-height: 0 !important;
          aspect-ratio: 8 / 5 !important;
        }
        .heroScreen .featureChips {
          grid-template-columns: 1fr !important;
          max-width: 420px !important;
        }
        .heroScreen .featureChips span {
          min-height: 58px !important;
          flex-direction: row !important;
          justify-content: flex-start !important;
          padding-inline: 16px !important;
        }
      }
    </style>
    <script type="module" crossorigin src="../src/roofCheckPublicHeader.js"></script>
    <script type="module" crossorigin src="../src/roofCheckApp.js"></script>
    <script type="module" crossorigin src="../src/roofMobileTargetPatch.js?v=4"></script>
    <script type="module" crossorigin src="../src/roofMapVertexEditPatch.js"></script>
    <script type="module" crossorigin src="../src/mapZoomSafetyPatch.js?v=3"></script>
    <script type="module" crossorigin src="../src/roofCheckMapPatch.js"></script>
    <script type="module" crossorigin src="../src/roofCalculationConsistencyPatch.js?v=2"></script>
    <script type="module" crossorigin src="../src/roofObstaclesMapPatch.js?v=2"></script>
    <script type="module" crossorigin src="../src/stagingPolish.js"></script>
    <script type="module" crossorigin src="../src/reportMetricsGridPatch.js?v=1"></script>
    <script type="module" crossorigin src="../src/reportUxFix.js?v=2"></script>
    <script type="module" crossorigin src="../src/roofCheckDeliveryPatch.js"></script>
    <script type="module" crossorigin src="../src/reportCalculationAuthorityPatch.js?v=1"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const IMAGE_URL = 'https://raw.githubusercontent.com/rubinigor-star/solatrix-site-master/main/roof-check/hero%20master.jpg?v=69b8ec0c';
        const ICON_AI = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3l1.3 3.7L17 8l-3.7 1.3L12 13l-1.3-3.7L7 8l3.7-1.3L12 3z"></path><path d="M18.5 13.5l.8 2.2 2.2.8-2.2.8-.8 2.2-.8-2.2-2.2-.8 2.2-.8.8-2.2z"></path><path d="M5.5 14.5l.7 1.8 1.8.7-1.8.7-.7 1.8-.7-1.8-1.8-.7 1.8-.7.7-1.8z"></path></svg>';
        const ICON_PDF = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h8l4 4v14H6z"></path><path d="M14 3v5h5"></path><path d="M9 13h6"></path><path d="M9 17h6"></path></svg>';
        const ICON_WHATSAPP = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11.5a8 8 0 0 1-11.9 7L4 20l1.5-4.1A8 8 0 1 1 20 11.5z"></path><path d="M9.2 8.7c.2-.4.4-.4.7-.4h.5c.2 0 .4.1.5.4l.8 1.8c.1.3.1.5-.1.7l-.7.8c-.2.2-.2.4 0 .7.5.9 1.3 1.7 2.2 2.2.3.2.5.2.7 0l.8-1c.2-.2.4-.3.7-.2l1.9.9c.3.1.4.3.4.5 0 .6-.3 1.4-.8 1.8-.6.5-1.4.8-2.2.6-1.4-.3-3.1-1.2-4.5-2.6-1.4-1.4-2.3-3.1-2.6-4.5-.2-.7 0-1.3.4-1.7.3-.4.7-.7 1.3-.8z"></path></svg>';

        const applyRoofCheckHero = () => {
          const card = document.querySelector('.heroScreen .visualCard');
          if (card) {
            card.classList.add('roofCheckHeroImage');
            let image = card.querySelector('.roofCheckHeroArtwork');
            if (!image) {
              image = document.createElement('img');
              image.className = 'roofCheckHeroArtwork';
              image.alt = 'Solatrix Roof Check solar analysis report';
              image.loading = 'eager';
              card.appendChild(image);
            }
            if (image.getAttribute('src') !== IMAGE_URL) image.src = IMAGE_URL;
          }

          const hero = document.querySelector('.heroScreen .heroCard');
          if (!hero) return;
          const chips = hero.querySelector('.featureChips');
          if (chips && chips.dataset.upgraded !== 'true') {
            chips.dataset.upgraded = 'true';
            chips.innerHTML = `
              <span>${ICON_AI}<b>AI ניתוח גג</b></span>
              <span>${ICON_PDF}<b>דוח מקצועי תוך דקות</b></span>
              <span>${ICON_WHATSAPP}<b>נשלח ישירות ל-WhatsApp</b></span>`;
          }
          const button = hero.querySelector('.primaryBtn.large');
          if (button && button.textContent.trim() !== 'קבלו דוח גג מקצועי') {
            button.textContent = 'קבלו דוח גג מקצועי';
          }
        };

        const observer = new MutationObserver(applyRoofCheckHero);
        observer.observe(document.getElementById('root'), { childList: true, subtree: true });
        applyRoofCheckHero();
      })();
    </script>
  </body>
</html>
