<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>הערכת פוטנציאל סולארי | Solatrix Energy</title>
    <meta name="description" content="Solatrix AI Platform — הערכת פוטנציאל סולארי, תפוקה, חיסכון וכדאיות תוך דקות." />
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
      .heroScreen {
        min-height: calc(100vh - 94px) !important;
        display: flex !important;
        align-items: center !important;
        padding: clamp(14px,1.8vh,24px) clamp(10px,1.25vw,22px) !important;
      }
      .heroScreen .heroGrid {
        width: min(98vw, 1900px) !important;
        min-height: clamp(500px, 58vh, 640px) !important;
        margin: 0 auto !important;
        align-items: stretch !important;
        gap: clamp(8px,.65vw,12px) !important;
        grid-template-columns: minmax(0,1fr) minmax(0,1.08fr) !important;
      }
      .heroScreen .heroGrid > * {
        min-height: 0 !important;
        height: 100% !important;
        aspect-ratio: auto !important;
      }
      .visualCard.roofCheckHeroImage {
        position: relative !important;
        width: 100% !important;
        height: 100% !important;
        min-height: 0 !important;
        aspect-ratio: auto !important;
        align-self: stretch !important;
        padding: 0 !important;
        overflow: hidden !important;
        background: #061827 !important;
        display: block !important;
        border-radius: clamp(24px,2vw,34px) !important;
        box-shadow: 0 28px 70px rgba(9,35,64,.18) !important;
        isolation: isolate;
      }
      .visualCard.roofCheckHeroImage::before,
      .visualCard.roofCheckHeroImage::after { display: none !important; }
      .visualCard.roofCheckHeroImage > *:not(.roofCheckHeroArtwork) { display: none !important; }
      .roofCheckHeroArtwork {
        position: absolute !important;
        inset: 0 !important;
        z-index: 2 !important;
        display: block !important;
        width: 100% !important;
        height: 100% !important;
        max-width: none !important;
        transform: none !important;
        object-fit: cover !important;
        object-position: center !important;
        border-radius: inherit;
      }
      .heroScreen .heroCard {
        height: 100% !important;
        min-height: clamp(500px, 58vh, 640px) !important;
        padding: clamp(28px,2vw,38px) clamp(28px,2.8vw,48px) !important;
        justify-content: center !important;
        overflow: hidden !important;
        border-radius: clamp(24px,2vw,34px) !important;
        box-shadow: 0 28px 70px rgba(9,35,64,.16) !important;
      }
      .heroScreen .heroCard .eyebrow {
        margin-bottom: 8px !important;
        font-size: clamp(12px,.75vw,14px) !important;
        letter-spacing: .08em !important;
      }
      .heroScreen .heroCard h1 {
        font-size: clamp(42px,3.25vw,58px) !important;
        line-height: 1.02 !important;
        margin: 0 0 14px !important;
        letter-spacing: -1.4px !important;
      }
      .heroScreen .heroText {
        max-width: 720px !important;
        font-size: clamp(16px,1.1vw,19px) !important;
        line-height: 1.4 !important;
        margin: 0 auto 18px !important;
      }
      .heroScreen .featureChips {
        display: grid !important;
        grid-template-columns: repeat(3,minmax(0,1fr)) !important;
        gap: clamp(10px,.8vw,14px) !important;
        width: 100% !important;
        max-width: 680px !important;
        margin: 0 auto 18px !important;
      }
      .heroScreen .featureChips span {
        min-height: 96px !important;
        padding: 12px 10px !important;
        border-radius: 20px !important;
        background: linear-gradient(180deg,#fffaf0,#fff3dc) !important;
        border: 1px solid rgba(245,161,26,.26) !important;
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        justify-content: center !important;
        gap: 6px !important;
        color: #5f431d !important;
        text-align: center !important;
        box-shadow: 0 12px 28px rgba(28,20,12,.06) !important;
      }
      .heroScreen .featureChips b {
        font-size: clamp(15px,.95vw,17px) !important;
        line-height: 1.1 !important;
      }
      .heroScreen .featureChips small {
        display: block !important;
        font-size: clamp(12px,.72vw,13px) !important;
        line-height: 1.25 !important;
        color: #8a6a3b !important;
        font-weight: 600 !important;
      }
      .heroScreen .featureChips svg {
        width: 26px !important;
        height: 26px !important;
        stroke: #f5a11a !important;
        stroke-width: 1.9 !important;
        fill: none !important;
        stroke-linecap: round !important;
        stroke-linejoin: round !important;
        flex: 0 0 auto !important;
      }
      .heroScreen .primaryBtn.large {
        width: min(100%,520px) !important;
        max-width: 520px !important;
        min-height: 60px !important;
        font-size: clamp(19px,1.2vw,22px) !important;
        box-shadow: 0 18px 38px rgba(245,161,26,.32) !important;
      }
      .heroScreen .primaryBtn.large:hover {
        transform: translateY(-2px) !important;
        box-shadow: 0 22px 44px rgba(245,161,26,.4) !important;
      }
      @media (max-width: 1180px) {
        .heroScreen { min-height: auto !important; }
        .heroScreen .heroGrid {
          width: min(96vw,1100px) !important;
          min-height: 0 !important;
          grid-template-columns: 1fr 1fr !important;
        }
        .heroScreen .heroGrid > * { height: auto !important; }
        .visualCard.roofCheckHeroImage {
          height: auto !important;
          aspect-ratio: 1 / 1 !important;
        }
        .heroScreen .heroCard {
          height: auto !important;
          min-height: 500px !important;
        }
      }
      @media (max-width: 760px) {
        .heroScreen { padding: 16px 14px 28px !important; }
        .heroScreen .heroGrid {
          width: 100% !important;
          align-items: initial !important;
          gap: 16px !important;
          grid-template-columns: 1fr !important;
        }
        .visualCard.roofCheckHeroImage {
          width: 100% !important;
          height: auto !important;
          min-height: 0 !important;
          aspect-ratio: 1 / 1 !important;
        }
        .heroScreen .heroCard {
          height: auto !important;
          min-height: 0 !important;
          padding: 26px 18px 24px !important;
        }
        .heroScreen .heroCard h1 { font-size: clamp(38px,11vw,54px) !important; }
        .heroScreen .featureChips {
          grid-template-columns: 1fr !important;
          max-width: 440px !important;
        }
        .heroScreen .featureChips span {
          min-height: 76px !important;
          flex-direction: row !important;
          justify-content: flex-start !important;
          text-align: right !important;
          padding-inline: 16px !important;
        }
        .heroScreen .featureChips span > div { flex: 1 !important; }
      }
    </style>
    <script type="module" crossorigin src="../src/roofCheckPublicHeader.js"></script>
    <script type="module" crossorigin src="../src/roofCheckApp.js"></script>
    <script type="module" crossorigin src="../src/roofAddressAutocomplete.js"></script>
    <script type="module" crossorigin src="../src/roofMobileTargetPatch.js?v=4"></script>
    <script type="module" crossorigin src="../src/roofMapVertexEditPatch.js"></script>
    <script type="module" crossorigin src="../src/mapZoomSafetyPatch.js?v=3"></script>
    <script type="module" crossorigin src="../src/roofCheckMapPatch.js"></script>
    <script type="module" crossorigin src="../src/roofCalculationConsistencyPatch.js?v=2"></script>
    <script type="module" crossorigin src="../src/roofObstaclesMapPatch.js?v=2"></script>
    <script type="module" crossorigin src="../src/stagingPolish.js"></script>
    <script type="module" crossorigin src="../src/reportMetricsGridPatch.js?v=1"></script>
    <script type="module" crossorigin src="../src/reportUxFix.js?v=2"></script>
    <script type="module" crossorigin src="../src/roofCheckDeliveryPatch.js"></script>
    <script type="module" crossorigin src="../src/reportCalculationAuthorityPatch.js?v=1"></script>
    <script type="module" crossorigin src="../src/roofCheckLeadLifecycle.js?v=1"></script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const IMAGE_URL = 'https://raw.githubusercontent.com/rubinigor-star/solatrix-site-master/main/roof-check/igor%20.jpg?v=2070bec';
        const HERO_SIGNATURE = 'solar-potential-v4';
        const ICON_SCAN = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3 10.5 12 4l9 6.5"></path><path d="M5.5 9.5V20h13V9.5"></path><path d="M8 14h8"></path><path d="M8 17h8"></path><path d="M4 3h4M4 3v4M20 3h-4M20 3v4"></path></svg>';
        const ICON_FORECAST = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 19V5"></path><path d="M4 19h16"></path><path d="m7 15 4-4 3 2 4-6"></path><path d="M16 7h2v2"></path></svg>';
        const ICON_REPORT = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h8l4 4v14H6z"></path><path d="M14 3v5h5"></path><path d="M9 12h6"></path><path d="M9 16h4"></path><circle cx="17.5" cy="17.5" r="3.5"></circle><path d="M16.2 17.5l.9.9 1.7-1.9"></path></svg>';
        const CHIPS_HTML = `
          <span>${ICON_SCAN}<div><b>סריקת הגג</b><small>שטח • שיפוע • כיוון</small></div></span>
          <span>${ICON_FORECAST}<div><b>תחזית כלכלית</b><small>תפוקה • חיסכון • ROI</small></div></span>
          <span>${ICON_REPORT}<div><b>דוח מקצועי</b><small>PDF + WhatsApp</small></div></span>`;

        let scheduled = false;
        const applyRoofCheckHero = () => {
          scheduled = false;
          const card = document.querySelector('.heroScreen .visualCard');
          const hero = document.querySelector('.heroScreen .heroCard');
          if (!card || !hero) return;

          card.classList.add('roofCheckHeroImage');
          let image = card.querySelector('.roofCheckHeroArtwork');
          if (!image) {
            image = document.createElement('img');
            image.className = 'roofCheckHeroArtwork';
            image.alt = 'Solatrix solar potential assessment report';
            image.loading = 'eager';
            card.appendChild(image);
          }
          if (image.getAttribute('src') !== IMAGE_URL) image.setAttribute('src', IMAGE_URL);

          const eyebrow = hero.querySelector('.eyebrow');
          if (eyebrow && eyebrow.textContent !== 'SOLATRIX AI PLATFORM') eyebrow.textContent = 'SOLATRIX AI PLATFORM';

          const title = hero.querySelector('h1');
          if (title && title.textContent !== 'הערכת פוטנציאל סולארי') title.textContent = 'הערכת פוטנציאל סולארי';

          const description = hero.querySelector('.heroText');
          const descriptionText = 'גלו את פוטנציאל ייצור החשמל, החיסכון והכדאיות של הגג שלכם תוך דקות.';
          if (description && description.textContent !== descriptionText) description.textContent = descriptionText;

          const chips = hero.querySelector('.featureChips');
          if (chips && chips.dataset.signature !== HERO_SIGNATURE) {
            chips.innerHTML = CHIPS_HTML;
            chips.dataset.signature = HERO_SIGNATURE;
          }

          const button = hero.querySelector('.primaryBtn.large');
          if (button && button.textContent !== 'קבלו הערכת פוטנציאל') button.textContent = 'קבלו הערכת פוטנציאל';
          hero.dataset.solatrixHeroReady = HERO_SIGNATURE;
        };

        const scheduleApply = () => {
          if (scheduled) return;
          scheduled = true;
          requestAnimationFrame(applyRoofCheckHero);
        };

        const root = document.getElementById('root');
        const observer = new MutationObserver(scheduleApply);
        observer.observe(root, { childList: true, subtree: true });
        window.addEventListener('popstate', scheduleApply);
        window.addEventListener('hashchange', scheduleApply);
        window.addEventListener('pageshow', scheduleApply);
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) scheduleApply();
        });
        scheduleApply();
      })();
    </script>
  </body>
</html>
