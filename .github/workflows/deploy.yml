name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Verify removed homepage sections
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('dist/index.html').read_text(encoding='utf-8')
          forbidden = [
              'הבעיה היא לא המערכת',
              'כל גג נראה אחרת',
          ]
          found = [text for text in forbidden if text in page]
          if found:
              raise SystemExit(f'Homepage cleanup failed; still found: {found}')
          print('Verified: both unwanted homepage sections are absent from dist/index.html')
          PY

      - name: Copy beta pages
        run: |
          if [ -d "beta" ]; then
            mkdir -p dist/beta
            cp -R beta/* dist/beta/
            echo "Copied beta pages into dist/beta"
          else
            echo "No beta directory to copy"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
