name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Strip unwanted homepage sections from built page
        run: |
          python - <<'PY'
          from html import unescape
          from pathlib import Path
          import re

          path = Path('dist/index.html')
          html = path.read_text(encoding='utf-8')

          tag_pattern = re.compile(r'</?section\b[^>]*>', re.I)
          stack = []
          spans = []

          for match in tag_pattern.finditer(html):
              tag = match.group(0)
              if re.match(r'<\/section', tag, re.I):
                  if not stack:
                      continue
                  start, open_tag = stack.pop()
                  spans.append((start, match.end(), open_tag))
              else:
                  stack.append((match.start(), tag))

          def visible_text(fragment):
              fragment = re.sub(r'<script\b[^>]*>[\s\S]*?<\/script>', ' ', fragment, flags=re.I)
              fragment = re.sub(r'<style\b[^>]*>[\s\S]*?<\/style>', ' ', fragment, flags=re.I)
              fragment = re.sub(r'<[^>]+>', ' ', fragment)
              return re.sub(r'\s+', ' ', unescape(fragment)).strip()

          targets = ['הבעיה היא לא המערכת', 'כל גג נראה אחרת']
          removals = []

          decision_candidates = [
              span for span in spans
              if re.search(r'\bid\s*=\s*["\']decision["\']', span[2], re.I)
          ]
          if decision_candidates:
              removals.append(min(decision_candidates, key=lambda span: span[1] - span[0]))

          for target in targets:
              candidates = [
                  span for span in spans
                  if target in visible_text(html[span[0]:span[1]])
              ]
              if candidates:
                  removals.append(min(candidates, key=lambda span: span[1] - span[0]))

          unique = {(start, end): (start, end, open_tag) for start, end, open_tag in removals}
          ordered = sorted(unique.values(), key=lambda span: span[0], reverse=True)

          for start, end, _ in ordered:
              html = html[:start] + html[end:]

          path.write_text(html, encoding='utf-8')
          print(f'Removed {len(ordered)} homepage section(s) from final artifact')
          PY

      - name: Verify removed homepage sections
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('dist/index.html').read_text(encoding='utf-8')
          forbidden = [
              'הבעיה היא לא המערכת',
              'כל גג נראה אחרת',
          ]
          found = [text for text in forbidden if text in page]
          if found:
              raise SystemExit(f'Homepage cleanup failed; still found: {found}')
          print('Verified: both unwanted homepage sections are absent from dist/index.html')
          PY

      - name: Copy beta pages
        run: |
          if [ -d "beta" ]; then
            mkdir -p dist/beta
            cp -R beta/* dist/beta/
            echo "Copied beta pages into dist/beta"
          else
            echo "No beta directory to copy"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
