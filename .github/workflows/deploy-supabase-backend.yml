name: Deploy Solatrix Supabase backend

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
      - '.github/workflows/deploy-supabase-backend.yml'
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type DEPLOY_BACKEND to apply migrations and deploy Edge Functions
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: solatrix-supabase-production
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build

  deploy:
    needs: validate
    if: ${{ github.event_name == 'push' || inputs.confirmation == 'DEPLOY_BACKEND' }}
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Validate deployment secrets
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN"
          test -n "$SUPABASE_DB_PASSWORD"
          test "$SUPABASE_PROJECT_ID" = "nafzypkwdaxmsswgyuuk"
      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID" --password "$SUPABASE_DB_PASSWORD"
      - name: Normalize legacy migration history
        run: |
          PGPASSWORD="$SUPABASE_DB_PASSWORD" psql "$(cat supabase/.temp/pooler-url)" -v ON_ERROR_STOP=1 -c \
            "update supabase_migrations.schema_migrations set version = '202607100001', name = 'crm_foundation' where version = '20260710' and name = '001_crm_foundation';"
      - name: Show migration status before deployment
        run: supabase migration list --linked
      - name: Apply pending database migrations
        run: supabase db push --linked --password "$SUPABASE_DB_PASSWORD"
      - name: Show migration status after deployment
        run: supabase migration list --linked
      - name: Deploy submit-lead Edge Function
        run: supabase functions deploy submit-lead --project-ref "$SUPABASE_PROJECT_ID"
