name: Repair imported static HTML

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/repair-static-html.yml'

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Restore valid UTF-8 sources and update contact number
        run: |
          git checkout 202006ba49c7996ca3dd23d486d41d8d40b162c4 -- \
            agriculture.html \
            business.html \
            contact.html \
            private-homes.html \
            solar-price.html \
            storage.html
          sed -i 's/972547299727/972542790088/g' \
            agriculture.html \
            business.html \
            contact.html \
            private-homes.html \
            solar-price.html \
            storage.html
          for file in agriculture.html business.html contact.html private-homes.html solar-price.html storage.html; do
            iconv -f UTF-8 -t UTF-8 "$file" >/dev/null
          done
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Commit repaired sources
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add agriculture.html business.html contact.html private-homes.html solar-price.html storage.html
          git diff --cached --quiet && exit 0
          git commit -m 'fix: restore valid static HTML encoding'
          git push
