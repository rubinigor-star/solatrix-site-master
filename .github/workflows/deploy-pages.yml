name: Deploy Solatrix production site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: solatrix-pages-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production
        uses: actions/checkout@v4

      - name: Restore approved homepage source
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/rubinigor-star/solatrix-site-master/a6bba1a/index.html \
            -o index.html
          grep -q "solatrix-v34-visual" index.html

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build production
        run: |
          rm -rf dist
          npx vite build --outDir dist --emptyOutDir
          echo "Generated files:"
          find dist -maxdepth 5 -type f -print | sort

      - name: Normalize homepage artifact
        run: |
          if [ ! -f dist/index.html ]; then
            candidate="$(find dist -mindepth 2 -type f -name index.html -print -quit)"
            if [ -n "$candidate" ]; then
              echo "Using generated homepage candidate: $candidate"
              cp "$candidate" dist/index.html
            else
              echo "No generated homepage was found. Current dist contents:"
              find dist -maxdepth 5 -print || true
              exit 1
            fi
          fi

      - name: Verify production artifact
        run: |
          test -f dist/index.html
          grep -q "hero-preview-card" dist/index.html
          if grep -R -n -F '<div aria-label="פעולות מהירות" class="mobile-bottom-cta">' dist; then
            echo 'Persistent mobile contact dock is still present in the production artifact.'
            exit 1
          fi
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
