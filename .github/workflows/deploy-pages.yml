name: Deploy Solatrix site and design preview

on:
  push:
    branches:
      - main
      - design/homepage-refresh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: solatrix-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: production

      - name: Checkout design preview branch
        uses: actions/checkout@v4
        with:
          ref: design/homepage-refresh
          path: preview-source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build production
        working-directory: production
        run: |
          npm install
          npm run build

      - name: Build preview with direct hero injection
        working-directory: preview-source
        run: |
          npm install
          npm run build

      - name: Assemble Pages site
        run: |
          rm -rf site
          mkdir -p site/preview
          cp -a production/dist/. site/
          cp -a preview-source/dist/. site/preview/
          test -f site/index.html
          test -f site/preview/index.html
          grep -q "hero-preview-card" site/preview/index.html
          touch site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
