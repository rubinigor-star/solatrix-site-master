name: Deploy Solatrix site and design preview

on:
  push:
    branches:
      - main
      - design/homepage-refresh
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: production

      - name: Checkout design preview branch
        uses: actions/checkout@v4
        with:
          ref: design/homepage-refresh
          path: preview-source

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            production/package.json
            preview-source/package.json

      - name: Install and build production
        working-directory: production
        run: |
          npm install
          npm run build

      - name: Install and build preview
        working-directory: preview-source
        run: |
          npm install
          npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p site/preview
          cp -R production/dist/. site/
          cp -R preview-source/dist/. site/preview/
          touch site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
