name: Deploy Solatrix production site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: solatrix-pages-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_GOVMAP_API_TOKEN: ${{ secrets.VITE_GOVMAP_API_TOKEN }}
    steps:
      - name: Checkout production
        uses: actions/checkout@v4

      - name: Restore approved homepage source
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/rubinigor-star/solatrix-site-master/a6bba1a/index.html \
            -o index.html
          grep -q "solatrix-v34-visual" index.html

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build production
        run: npm run build

      - name: Publish direct Roof Check routes
        run: |
          test -f dist/roof-check/index.html
          python3 - <<'PY'
          from pathlib import Path

          app_path = Path('dist/roof-check/index.html')
          app_html = app_path.read_text(encoding='utf-8')
          bootstrap = '''<script id="solatrix-route-bootstrap">
          (() => {
            const route = new URLSearchParams(location.search).get('route');
            const allowed = new Set(['address','roof-type','roof-marking','obstacles','analysis','report','admin']);
            if (!allowed.has(route)) return;
            const prefix = location.pathname.replace(/\/roof-check\/?$/, '/roof-check/');
            history.replaceState({ directRoute: route }, '', prefix + route);
          })();
          </script>'''
          if 'solatrix-route-bootstrap' not in app_html:
              app_html = app_html.replace('</head>', bootstrap + '\n</head>', 1)
              app_path.write_text(app_html, encoding='utf-8')

          for route in ('address', 'roof-type', 'roof-marking', 'obstacles', 'analysis', 'report', 'admin'):
              target = Path('dist/roof-check') / route / 'index.html'
              target.parent.mkdir(parents=True, exist_ok=True)
              destination = f'/solatrix-site-master/roof-check/?route={route}'
              redirect = f'''<!doctype html>
          <html lang="he" dir="rtl">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width,initial-scale=1">
            <meta http-equiv="refresh" content="0;url={destination}">
            <link rel="canonical" href="{destination}">
            <title>Solatrix Roof Check</title>
            <script>location.replace({destination!r});</script>
          </head>
          <body></body>
          </html>'''
              target.write_text(redirect, encoding='utf-8')
          PY

      - name: Add accessibility controls and remove link underlines
        run: |
          cp src/accessibilityWidget.js dist/accessibilityWidget.js
          python3 - <<'PY'
          from pathlib import Path

          version = '4b9ff1a1'
          script = f'<script src="/solatrix-site-master/accessibilityWidget.js?v={version}"></script>'
          style = '''<style id="solatrix-no-link-underlines">
          a,
          a:link,
          a:visited,
          a:hover,
          a:active,
          a:focus,
          nav a,
          header a,
          [role="button"],
          .btn,
          .button,
          .cta,
          .nav-link {
            text-decoration: none !important;
            text-decoration-line: none !important;
          }
          </style>'''

          for page in Path('dist').rglob('*.html'):
              html = page.read_text(encoding='utf-8')
              if 'solatrix-no-link-underlines' not in html:
                  if '</head>' in html:
                      html = html.replace('</head>', f'{style}\n</head>', 1)
                  else:
                      html = style + '\n' + html
              if 'accessibilityWidget.js' not in html:
                  if '</body>' in html:
                      html = html.replace('</body>', f'{script}\n</body>', 1)
                  else:
                      html += f'\n{script}\n'
              else:
                  import re
                  html = re.sub(r'<script[^>]+accessibilityWidget\.js[^>]*></script>', script, html)
              page.write_text(html, encoding='utf-8')
          PY

      - name: Verify production artifact
        run: |
          test -f dist/index.html
          grep -q "hero-preview-card" dist/index.html
          grep -q "accessibilityWidget.js" dist/index.html
          grep -q "solatrix-no-link-underlines" dist/index.html
          test -f dist/accessibilityWidget.js
          test -f dist/roof-check/index.html
          test -f dist/roof-check/address/index.html
          grep -q "solatrix-route-bootstrap" dist/roof-check/index.html
          grep -q "route=address" dist/roof-check/address/index.html
          grep -R -q "הספק מערכת" dist/assets dist/roof-check || {
            echo 'The approved PDF template was not found in the production build.'
            exit 1
          }
          if grep -R -n -F '<div aria-label="פעולות מהירות" class="mobile-bottom-cta">' dist; then
            echo 'Persistent mobile contact dock is still present in the production artifact.'
            exit 1
          fi
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
