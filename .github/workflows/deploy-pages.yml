name: Deploy Solatrix production site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: solatrix-pages-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout production
        uses: actions/checkout@v4

      - name: Restore approved homepage source
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/rubinigor-star/solatrix-site-master/a6bba1a/index.html \
            -o index.html
          grep -q "solatrix-v34-visual" index.html

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build production
        run: npm run build

      - name: Add accessibility controls
        run: |
          cp src/accessibilityWidget.js dist/accessibilityWidget.js
          python3 - <<'PY'
          from pathlib import Path

          script = '<script src="/solatrix-site-master/accessibilityWidget.js"></script>'
          for page in Path('dist').rglob('*.html'):
              html = page.read_text(encoding='utf-8')
              if 'accessibilityWidget.js' in html:
                  continue
              if '</body>' in html:
                  html = html.replace('</body>', f'{script}\n</body>', 1)
              else:
                  html += f'\n{script}\n'
              page.write_text(html, encoding='utf-8')
          PY

      - name: Verify production artifact
        run: |
          test -f dist/index.html
          grep -q "hero-preview-card" dist/index.html
          grep -q "accessibilityWidget.js" dist/index.html
          test -f dist/accessibilityWidget.js
          test -d dist/roof-check
          grep -R -q "הספק המערכת" dist/assets dist/roof-check || {
            echo 'The approved PDF template was not found in the production build.'
            exit 1
          }
          if grep -R -n -F '<div aria-label="פעולות מהירות" class="mobile-bottom-cta">' dist; then
            echo 'Persistent mobile contact dock is still present in the production artifact.'
            exit 1
          fi
          touch dist/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
