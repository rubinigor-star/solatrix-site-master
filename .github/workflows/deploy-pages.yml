name: Deploy Solatrix production site

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: solatrix-pages-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - name: Checkout production
        uses: actions/checkout@v4

      - name: Restore approved homepage source
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/rubinigor-star/solatrix-site-master/a6bba1a/index.html \
            -o "$GITHUB_WORKSPACE/index.html"
          grep -q "solatrix-v34-visual" "$GITHUB_WORKSPACE/index.html"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build production
        run: |
          rm -rf "$GITHUB_WORKSPACE/dist"
          npm run build
          echo "Generated files:"
          find "$GITHUB_WORKSPACE/dist" -maxdepth 6 -type f -print | sort || true

      - name: Normalize homepage artifact
        run: |
          if [ -f "$GITHUB_WORKSPACE/dist/index.html" ]; then
            echo "Homepage already exists at dist/index.html"
          elif [ -f "$GITHUB_WORKSPACE/dist/main.html" ]; then
            echo "Using Vite multi-page output dist/main.html as homepage"
            cp "$GITHUB_WORKSPACE/dist/main.html" "$GITHUB_WORKSPACE/dist/index.html"
          else
            HOMEPAGE_FILE="$(find "$GITHUB_WORKSPACE/dist" -type f -name '*.html' -print0 | xargs -0 grep -l 'solatrix-v34-visual' | head -n 1 || true)"
            if [ -z "$HOMEPAGE_FILE" ]; then
              echo "Could not locate the built homepage. HTML files found:"
              find "$GITHUB_WORKSPACE/dist" -type f -name '*.html' -print || true
              exit 1
            fi
            echo "Using built homepage: $HOMEPAGE_FILE"
            cp "$HOMEPAGE_FILE" "$GITHUB_WORKSPACE/dist/index.html"
          fi

      - name: Verify production artifact
        run: |
          test -s "$GITHUB_WORKSPACE/dist/index.html"
          grep -q "solatrix-v34-visual" "$GITHUB_WORKSPACE/dist/index.html"
          if grep -R -n -F '<div aria-label="פעולות מהירות" class="mobile-bottom-cta">' "$GITHUB_WORKSPACE/dist"; then
            echo 'Persistent mobile contact dock is still present in the production artifact.'
            exit 1
          fi
          touch "$GITHUB_WORKSPACE/dist/.nojekyll"

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ github.workspace }}/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
