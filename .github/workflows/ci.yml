name: Validate site

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Verify key build outputs
        run: |
          test -f dist/index.html
          test -f dist/contact.html
          test -f dist/roof-check/index.html
