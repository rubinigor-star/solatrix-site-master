name: Validate site

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'feature/**'

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build site
        run: npm run build

      - name: Verify key build outputs
        run: |
          test -f dist/index.html
          test -f dist/contact.html
          test -f dist/admin.html
          test -f dist/roof-check/index.html

      - name: Report successful build on the pull request
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- solatrix-ci-build -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let issueNumber = context.issue.number;

            if (!issueNumber) {
              const branch = context.ref.replace('refs/heads/', '');
              const { data: pulls } = await github.rest.pulls.list({
                owner,
                repo,
                state: 'open',
                head: `${owner}:${branch}`
              });
              issueNumber = pulls[0]?.number;
            }

            if (!issueNumber) return;

            const body = `${marker}\n✅ Production build passed for commit \`${context.sha.slice(0, 7)}\`. Verified outputs: main site, contact page, CRM and Roof Check.`;
            const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number: issueNumber });
            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: issueNumber, body });
            }
