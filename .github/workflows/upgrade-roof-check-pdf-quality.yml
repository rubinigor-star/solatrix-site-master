name: Upgrade Roof Check PDF quality

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/upgrade-roof-check-pdf-quality.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch-quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upgrade PDF raster quality
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/reportPdfClient.js')
          text = path.read_text(encoding='utf-8')

          replacements = {
              "format: 'a4', compress: true": "format: 'a4', compress: false",
              "scale: 1.7,": "scale: 3,",
              "const image = canvas.toDataURL('image/jpeg', 0.92);": "const image = canvas.toDataURL('image/jpeg', 0.98);",
              "pdf.addImage(image, 'JPEG', 0, 0, 210, 297, undefined, 'FAST');": "pdf.addImage(image, 'JPEG', 0, 0, 210, 297, undefined, 'NONE');",
          }

          missing = [old for old in replacements if old not in text]
          if missing:
              raise SystemExit(f'Expected source patterns not found: {missing}')

          for old, new in replacements.items():
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Verify quality settings
        run: |
          grep -q "scale: 3," src/reportPdfClient.js
          grep -q "image/jpeg', 0.98" src/reportPdfClient.js
          grep -q "undefined, 'NONE'" src/reportPdfClient.js
          grep -q "format: 'a4', compress: false" src/reportPdfClient.js

      - name: Commit quality upgrade
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/reportPdfClient.js
          git commit -m "Improve Roof Check PDF rendering quality [skip ci]"
          git push
