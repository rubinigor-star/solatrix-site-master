<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solatrix PDF Preview</title>
  <style>
    html,body{margin:0;min-height:100%;background:#f6f1e8;font-family:Arial,sans-serif;color:#062840}
    .bar{position:sticky;top:0;z-index:10;display:flex;gap:12px;align-items:center;justify-content:center;padding:12px;background:#fff;border-bottom:1px solid #ddd}
    button,a{border:0;border-radius:10px;padding:11px 16px;font-weight:700;text-decoration:none;cursor:pointer}
    button{background:#f5a11a;color:#062840} a{background:#062840;color:#fff}
    iframe{display:block;width:100%;height:calc(100vh - 66px);border:0;background:#ddd}
    .status{font-size:14px;color:#667}
  </style>
</head>
<body>
  <div class="bar">
    <button id="refresh">רענן תצוגה</button>
    <a id="download" href="#" download="solatrix-pdf-preview.pdf">הורדת PDF</a>
    <span class="status" id="status">טוען תצוגה…</span>
  </div>
  <iframe id="viewer" title="PDF preview"></iframe>
  <script type="module" src="./src/pdfPreview.js"></script>
</body>
</html>
