<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>מעבר לבדיקת גג | Solatrix Energy</title>
    <meta name="description" content="מעבר לבדיקת הגג החכמה של Solatrix Energy." />
    <meta http-equiv="refresh" content="0; url=./roof-check/" />
    <script>
      (function () {
        var target = new URL('./roof-check/', window.location.href).href;
        window.location.replace(target);
      })();
    </script>
    <style>
      :root{--cream:#fff8ec;--ink:#17120d;--muted:#675646;--gold:#f5a11a;--navy:#071b2f;--line:#ead7bc}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 20% 20%,rgba(245,161,26,.18),transparent 34%),linear-gradient(135deg,#fffaf1,#f2dfc2);font-family:Assistant,Arial,sans-serif;color:var(--ink);padding:24px}.card{width:min(560px,100%);border-radius:32px;background:rgba(255,255,255,.82);border:1px solid var(--line);box-shadow:0 28px 80px rgba(63,40,17,.16);padding:34px;text-align:center}.eyebrow{margin:0 0 10px;color:#a86513;font-weight:900;letter-spacing:.08em;text-transform:uppercase}h1{margin:0 0 12px;font-size:clamp(30px,6vw,48px);line-height:1.04}p{margin:0 auto 22px;color:var(--muted);font-size:18px;line-height:1.55}.btn{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:15px 24px;background:linear-gradient(135deg,var(--gold),#ffbf54);color:#1b1208;text-decoration:none;font-weight:900;box-shadow:0 18px 42px rgba(245,161,26,.24)}.secondary{display:block;margin-top:14px;color:var(--navy);font-weight:800;text-decoration:none}@media(max-width:600px){.card{padding:28px 20px;border-radius:24px}}
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Solatrix Roof Check</p>
      <h1>מעבירים אתכם לבדיקת הגג החכמה</h1>
      <p>אם המעבר האוטומטי לא נפתח, לחצו על הכפתור והמשיכו למחשבון החי.</p>
      <a class="btn" href="./roof-check/">פתחו את מחשבון בדיקת הגג</a>
      <a class="secondary" href="./">חזרה לאתר Solatrix</a>
    </main>
  </body>
</html>
