<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solatrix Energy</title>
  <style>html,body{margin:0;min-height:100%;background:#fffaf1}body{opacity:0}</style>
</head>
<body>
<script>
(async function(){
  try {
    const sourceUrl = 'https://raw.githubusercontent.com/rubinigor-star/solatrix-site-master/73976df044053599282d8b880b8e4669fe67b1d6/faq.html';
    const response = await fetch(sourceUrl, { cache: 'no-store' });
    if (!response.ok) throw new Error('source load failed');
    let html = await response.text();

    html = html.replace(
      /<div\s+aria-label="פעולות מהירות"\s+class="mobile-bottom-cta">[\s\S]*?<\/div>\s*/i,
      ''
    );

    html = html.replace('</head>', `
      <style>
        .mobile-bottom-cta{display:none!important}
        @media(max-width:980px){body{padding-bottom:0!important}}
      </style>
      </head>`);

    html = html.replace('</body>', `
      <script>
        document.querySelectorAll('.mobile-bottom-cta').forEach(function(el){el.remove();});
        document.body.style.setProperty('padding-bottom','0','important');
        document.body.style.opacity='1';
      <\/script>
      </body>`);

    document.open();
    document.write(html);
    document.close();
  } catch (error) {
    document.body.style.opacity='1';
    document.body.innerHTML='<main style="padding:40px;text-align:center;font-family:Arial"><h1>Solatrix Energy</h1><p>נא לרענן את העמוד.</p></main>';
  }
})();
</script>
</body>
</html>
