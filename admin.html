<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solatrix CRM Mock</title>
    <style>
      body{margin:0;background:#f8efe0;color:#24170c;font-family:Arial,"Noto Sans Hebrew",sans-serif}.adminTopbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;justify-content:space-between;gap:18px;padding:16px clamp(18px,4vw,54px);background:rgba(255,250,240,.92);backdrop-filter:blur(10px);box-shadow:0 8px 28px rgba(61,39,16,.08)}.adminBrand{display:grid;text-decoration:none;color:#24170c}.adminBrand strong{font-size:20px}.adminBrand span{font-size:12px;color:#a8641b;font-weight:900}.adminTopbar nav{display:flex;gap:12px;flex-wrap:wrap}.adminTopbar a{color:#2d2115;font-weight:850;text-decoration:none}.adminPage{max-width:1240px;margin:auto;padding:34px clamp(14px,3vw,36px) 80px}.adminHero{border-radius:32px;padding:32px;background:linear-gradient(135deg,#fff8e8,#f7d49b);box-shadow:0 24px 70px rgba(73,45,17,.12);position:relative;overflow:hidden}.adminHero:after{content:"";position:absolute;left:-80px;bottom:-90px;width:250px;height:250px;border-radius:50%;background:rgba(242,138,0,.2)}.eyebrow{margin:0 0 10px;color:#ad6a18;font-weight:900;letter-spacing:.08em;text-transform:uppercase}.adminHero h1{margin:0;font-size:clamp(34px,6vw,64px)}.adminHero p{max-width:760px;line-height:1.65;color:#5f4a35;font-weight:700}.adminHeroActions,.actionsCell{display:flex;gap:10px;flex-wrap:wrap}.adminHeroActions a,.adminHeroActions button,.actionsCell a,.actionsCell button,.emptyState a{border:0;border-radius:999px;padding:11px 16px;background:#172c3f;color:white;text-decoration:none;font-weight:900;cursor:pointer}.adminHeroActions button:nth-child(2),.actionsCell button{background:#fff;color:#172c3f;border:1px solid rgba(23,44,63,.18)}.adminStatsGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0}.adminStatsGrid div,.adminLeadsCard{border-radius:24px;background:#fffaf0;padding:20px;box-shadow:0 18px 50px rgba(73,45,17,.08);border:1px solid rgba(152,98,43,.12)}.adminStatsGrid span{display:block;color:#76593b;font-weight:850}.adminStatsGrid b{font-size:34px}.adminCardHead{display:flex;justify-content:space-between;align-items:center;gap:12px}.adminCardHead h2{margin:0;font-size:28px}.adminTableWrap{overflow:auto}.adminTable{width:100%;border-collapse:separate;border-spacing:0 10px;min-width:1050px}.adminTable th{text-align:right;color:#75593d;font-size:13px}.adminTable td{background:white;padding:14px;border-block:1px solid rgba(118,89,61,.1)}.adminTable td:first-child{border-radius:0 16px 16px 0}.adminTable td:last-child{border-radius:16px 0 0 16px}.sourcePill{display:inline-flex;border-radius:999px;background:#fff0d9;color:#9d5b12;padding:6px 10px;font-weight:900}.calcCell small{display:block;color:#6d5b46;font-weight:750}.adminTable select,.notesRow textarea{width:100%;border:1px solid rgba(92,64,34,.18);border-radius:12px;padding:9px;font:inherit}.notesRow td{background:#fff7e8!important}.notesRow label{display:grid;gap:8px;font-weight:850}.emptyState{text-align:center;padding:42px}.emptyState h3{font-size:30px;margin:0 0 8px}@media(max-width:760px){.adminTopbar{align-items:flex-start;flex-direction:column}.adminStatsGrid{grid-template-columns:1fr 1fr}.adminHero{padding:24px}.adminPage{padding-bottom:110px}}
    </style>
  </head>
  <body>
    <div id="admin-root"></div>
    <script type="module" src="./src/adminDashboard.js"></script>
  </body>
</html>
